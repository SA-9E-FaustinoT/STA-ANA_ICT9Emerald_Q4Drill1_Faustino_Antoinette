<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Drill 1 Q4: Electricity Consumption Classifiere💡</title>

    <style>
        body {
            background: linear-gradient(135deg, #0f0f1a, #1a1033);
            height: 100vh;
        }

        h3 {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            color: #ffc107;
            text-shadow: 0 0 10px rgba(122, 65, 168, 0.7);
        }

        #kWh {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 40px;
            color: #ffc107;
            text-shadow: 0 0 20px rgba(122, 65, 168, 0.7);
        }

        .bg-dark {
            background: linear-gradient(135deg, #1a1033, #42055f) !important;
            border: 1px solid #7a41a8;
            box-shadow: 0 0 20px rgba(122, 67, 167, 0.5);
            transition: 0.3s;
        }

        .bg-dark:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(252, 205, 66, 0.4);
        }

        .logo {
            border: 1px solid #7a41a8;
            box-shadow: 0 0 20px rgba(252, 205, 66, 0.4);
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(206, 147, 255, 0.5);
        }

        #consumption {
            background-color: #0f0f1a;
            color: white;
            border: 1px solid #7a41a8;
            text-align: center;
        }

        #consumption:focus {
            border: 1px solid #ffc107;
            box-shadow: 0 0 10px #ffc107;
        }

        .btn {
            background-color: #7a41a8 !important;
            color: white;
            border: none;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ffc107 !important;
            color: black;
            transform: scale(1.1);
        }

        #message1 {
            margin-top: 10px;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="bg-dark text-light rounded-5 p-4 text-center">

        <h3>Electricity Consumption Classifier💡</h3>

        <img src="https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/14baee5b-9ec0-4f5f-b374-bd9080c1a5bf.png" style="height: 130px; width: 130px;" class="logo">

        <input type="text" class="form-control my-2" id="consumption" placeholder="Input kilowatt per hour">
        
        <button type="button" class="btn my-2" onclick="check_class()">
            Consumption Classification
        </button>

        <p id="message1" class="fst-italic"></p>

    </div>
</div>

<script>
function check_class() {

    var input = document.getElementById("consumption").value;
    var checker = Number(input);
    var msg = document.getElementById("message1");

    msg.innerHTML = "";

    if (input === "" || isNaN(checker) || checker < 0) {

        msg.style.color = "#ff4d4d";
        msg.innerHTML = "ERROR❗<br> Please input a valid number.";
        return;
    }

    if (checker <= 100) {

        msg.style.color = "#ff884d";
        msg.innerHTML =
        "<b>⚡ Lifeline Consumer</b> <br>" +
        "Consumption: " + checker + " kWh <br> " +
        "🌟 Very low usage / discounted rates<br>" +
        '<a href="https://company.meralco.com.ph/news-and-advisories/lifeline-rate-faqs" target="_blank">Learn more about Lifeline Rates☝️</a>';
    }

    else if (checker <= 200) {

        msg.style.color = "#ff884d";
        msg.innerHTML =
        "<b>⚡ Low Consumption</b><br>" +
        "Consumption: " + checker + " kWh <br> " +
        "🎀 Below average household usage <br>" +
        '<a href="https://company.meralco.com.ph/news-and-advisories/lifeline-rate-faqs" target="_blank">Learn more about Lifeline Rates☝️</a>';
    }

    else if (checker <= 300) {

        msg.style.color = "#ff884d";
        msg.innerHTML =
        "<b>⚡ Average Consumption</b> <br> " +
        "Consumption: " + checker + " kWh <br> " +
        "🔌 Typical household usage<br>" +
        '<a href="https://company.meralco.com.ph/news-and-advisories/lifeline-rate-faqs" target="_blank">Learn more about Lifeline Rates☝️</a>';
    }

    else if (checker <= 500) {

        msg.style.color = "#ff884d";
        msg.innerHTML =
        "<b>⚡ High Consumption</b> <br> " +
        "Consumption: " + checker + " kWh <br> " +
        "⚠ Above average usage (many appliances / AC usage)<br>" +
        '<a href="https://company.meralco.com.ph/news-and-advisories/lifeline-rate-faqs" target="_blank">Learn more about Lifeline Rates☝️</a>';
    }

    else {

        msg.style.color = "#ff884d";
        msg.innerHTML =
        "<b>⚡ Very High Consumption</b> <br> " +
        "Consumption: " + checker + " kWh <br> " +
        "⁉️ Heavy electricity usage (large household)<br>" +
        '<a href="https://company.meralco.com.ph/news-and-advisories/lifeline-rate-faqs" target="_blank">Learn more about Lifeline Rates☝️</a>';
    }
}
</script>

</body>
</html>
